<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观光模式 - 所有建筑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0b10; font-family: Arial, sans-serif; overflow: hidden; }
        .game-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        .world-map {
            width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect width="1200" height="800" fill="%23ffe4ed"/><path d="M280,140 L420,110 L530,160 L560,260 L490,340 L350,360 L240,300 L200,210 Z" fill="%233a3f5e" stroke="%23555a7a" stroke-width="1.2" opacity="0.85"/><path d="M620,90 L780,70 L890,130 L920,240 L840,320 L700,330 L590,270 L560,160 Z" fill="%23343a58" stroke="%234f5577" stroke-width="1.2" opacity="0.85"/><path d="M880,380 L1020,360 L1120,440 L1070,560 L930,590 L810,540 L790,450 Z" fill="%23303552" stroke="%234a5072" opacity="0.85"/><path d="M230,500 L380,470 L510,530 L490,650 L360,700 L200,660 L150,560 Z" fill="%23363c5c" stroke="%23525878" opacity="0.85"/><path d="M530,450 L650,430 L740,480 L720,580 L610,620 L510,580 L490,490 Z" fill="%232f3452" stroke="%2344486b" opacity="0.85"/><path d="M780,630 L900,610 L980,680 L930,760 L820,770 L730,710 Z" fill="%233a3f5e" opacity="0.85"/><path d="M400,720 L520,700 L590,760 L540,790 L420,790 Z" fill="%23303552" opacity="0.85"/><path d="M90,280 L180,240 L250,290 L230,380 L150,400 L80,360 Z" fill="%233a3f5e" opacity="0.8"/></svg>');
            background-size: cover; background-position: center; background-color: #ffe4ed;
            position: relative;
        }
        .building-spot {
            position: absolute;
            width: 24px; height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc66, #ff9933);
            box-shadow: 0 0 12px #ffaa44;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: bold; color: #1e1a2a;
            pointer-events: none; z-index: 5;
            white-space: nowrap;
        }
        .info-panel {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(11,11,16,0.85); backdrop-filter: blur(12px);
            border-radius: 40px; padding: 12px 24px;
            color: white; display: flex; justify-content: space-between;
            z-index: 200; border: 1px solid #ff8fcf;
        }
        .back-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: #2a2a33; border: none; padding: 8px 20px;
            border-radius: 40px; color: white; font-weight: 900;
            cursor: pointer; z-index: 200;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="world-map" id="worldMap"></div>
    <div class="info-panel">
        <span>👁️ 观光模式 · 所有50座建筑已显示</span>
        <span>移动鼠标查看建筑位置</span>
    </div>
    <button class="back-btn" id="backBtn">🏠 主菜单</button>
</div>

<script>

        { name: "Solomon R. Guggenheim Museum (1943)", lat: 40.7830, lng: -73.9590 },
        { name: "Casa Batlló (1904)", lat: 41.3916, lng: 2.1649 },
        { name: "Casa Milà (1906)", lat: 41.3954, lng: 2.1620 },
        { name: "Sydney Opera House (1959)", lat: -33.8568, lng: 151.2153 },
        { name: "Snowflake Motel (1960)", lat: 34.1019, lng: -118.3355 },
        { name: "Lotus Temple (1980)", lat: 28.5535, lng: 77.2588 },
        { name: "Louvre Pyramid (1985)", lat: 48.8606, lng: 2.3376 },
        { name: "Milwaukee Art Museum (1994)", lat: 43.0399, lng: -87.8971 },
        { name: "Esplanade – Theatres on the Bay (1996)", lat: 1.2894, lng: 103.8570 },
        { name: "Federation Square (1997)", lat: -37.8175, lng: 144.9689 },
        { name: "Eden Project (1998)", lat: 50.3618, lng: -4.7448 },
        { name: "Seattle Central Library (1998)", lat: 47.6062, lng: -122.3321 },
        { name: "City Hall London (1998)", lat: 51.5151, lng: -0.0805 },
        { name: "Selfridges Birmingham (1999)", lat: 52.4778, lng: -1.8944 },
        { name: "Torre Agbar (1999)", lat: 41.4031, lng: 2.1897 },
        { name: "Kunsthaus Graz (1999)", lat: 47.0711, lng: 15.4340 },
        { name: "Walt Disney Concert Hall (1999)", lat: 34.0552, lng: -118.2499 },
        { name: "The Gherkin (2001)", lat: 51.5145, lng: -0.0802 },

        { name: "Beijing National Aquatics Center (2003)", lat: 39.9918, lng: 116.3839 },
        { name: "BMW Welt (2003)", lat: 48.1764, lng: 11.5577 },
        { name: "Metropol Parasol (2005)", lat: 37.3931, lng: -5.9912 },
        { name: "The National Taichung Theater (2005)", lat: 24.1604, lng: 120.6405 },
        { name: "Cayan Tower (2006)", lat: 25.0880, lng: 55.1470 },
        { name: "Fondation Louis Vuitton (2006)", lat: 48.8763, lng: 2.2632 },
        { name: "Khan Shatyr (2006)", lat: 51.1694, lng: 71.4147 },

        { name: "Phoenix International Media Center (2008)", lat: 39.9061, lng: 116.3639 },
        { name: "Shanghai Tower (2008)", lat: 31.2359, lng: 121.5012 },
        { name: "Galaxy SOHO (2009)", lat: 39.9283, lng: 116.4355 },
        { name: "DDP (Dongdaemun Design Plaza) (2009)", lat: 37.5668, lng: 127.0092 },
        { name: "Harbin Opera House (2010)", lat: 45.7467, lng: 126.5858 },
        { name: "Lotus Building Wujin (2010)", lat: 31.7409, lng: 119.9566 },
        { name: "Museo Soumaya (2011)", lat: 19.4406, lng: -99.2047 },
        { name: "Apple Park (2013)", lat: 37.3349, lng: -122.0090 },
        { name: "Vessel (2017)", lat: 40.7539, lng: -74.0020 },
        { name: "Burj Khalifa (2010)", lat: 25.1972, lng: 55.2744 }
    ];

    function lngToX(lng) { return ((lng + 180) / 360) * 100; }
    function latToY(lat) { let limited = Math.max(-85, Math.min(85, lat)); return ((85 - limited) / 170) * 100; }

    const worldMapDiv = document.getElementById('worldMap');

    function renderBuildings() {
        const rect = document.querySelector('.game-container').getBoundingClientRect();
        worldMapDiv.innerHTML = '';
        BUILDINGS.forEach(b => {
            let xPercent = lngToX(b.lng);
            let yPercent = latToY(b.lat);
            let xPx = (xPercent / 100) * rect.width;
            let yPx = (yPercent / 100) * rect.height;
            xPx = Math.min(Math.max(xPx, 15), rect.width - 15);
            yPx = Math.min(Math.max(yPx, 15), rect.height - 15);
            const spot = document.createElement('div');
            spot.className = 'building-spot';
            let shortName = b.name.length > 18 ? b.name.slice(0, 16) + '..' : b.name;
            spot.innerText = shortName;
            spot.style.left = xPx + 'px';
            spot.style.top = yPx + 'px';
            worldMapDiv.appendChild(spot);
        });
    }

    window.addEventListener('resize', () => setTimeout(renderBuildings, 100));
    renderBuildings();
    document.getElementById('backBtn').onclick = () => { window.location.href = 'index.html'; };
</script>
</body>
</html>
