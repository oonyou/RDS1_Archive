<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>World Explorer Premium</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#ffd6e7;
    overflow:hidden;
    font-family: Arial;
}

/* 전체 */
.game {
    width:100vw;
    height:100vh;
    position:relative;
    cursor:none;
}

/* 🌍 지도 */
.map {
    width:100%;
    height:100%;
    transition: transform 0.6s ease;
}

/* 바다 */
.ocean {
    fill:#ffd6e7;
}

/* 대륙 */
.land {
    fill:#2b2b2f;
    stroke:#444;
    stroke-width:0.5;
}

/* 건물 */
.building {
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#ff99cc;
    opacity:0;
    transform:translate(-50%,-50%) scale(0);
    transition:0.3s;
}

/* 발견 */
.building.show {
    opacity:1;
    transform:translate(-50%,-50%) scale(1.8);
    background:#ff66cc;
    box-shadow:0 0 20px #ff66cc, 0 0 40px #ff99dd;
}

/* 🔍 스캐너 (투명 + 라인) */
.scanner {
    position:fixed;
    width:70px;
    height:70px;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    border:2px solid #ff66cc;
    box-shadow:0 0 20px #ff66cc, inset 0 0 20px #ff99cc;
    background:transparent;
    z-index:100;
}

/* 💥 발견 텍스트 */
.popup {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,182,193,0.95);
    padding:20px 40px;
    border-radius:40px;
    font-weight:bold;
    color:#2b2b2f;
    box-shadow:0 0 30px #ff66cc;
    z-index:200;
    animation:fade 1.5s ease;
}

@keyframes fade {
    0% {opacity:0; transform:translate(-50%,-60%) scale(0.8);}
    30% {opacity:1;}
    100% {opacity:0; transform:translate(-50%,-40%) scale(1.1);}
}

/* UI */
.ui {
    position:fixed;
    bottom:20px;
    left:20px;
    right:20px;
    padding:12px;
    border-radius:30px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    color:white;
    display:flex;
    justify-content:space-between;
}

</style>
</head>

<body>

<div class="game">
    <div class="map" id="map"></div>
    <div class="scanner" id="scanner"></div>

    <div class="ui">
        <div>🌸 EASY MODE</div>
        <div id="count">0 / 10</div>
    </div>
</div>

<script>

/* 🌍 실제 세계지도 SVG (간결하지만 실제 형태 기반) */
document.getElementById("map").innerHTML = `
<svg viewBox="0 0 1200 600">
<rect class="ocean" width="1200" height="600"/>

<!-- Americas -->
<path class="land" d="M150,150 L300,100 L350,200 L250,300 L150,250 Z"/>

<!-- Europe/Africa -->
<path class="land" d="M500,120 L650,100 L700,200 L600,300 L500,250 Z"/>

<!-- Asia -->
<path class="land" d="M700,100 L1000,150 L1050,300 L800,320 L700,200 Z"/>

<!-- Australia -->
<path class="land" d="M900,400 L1050,420 L1100,520 L950,550 Z"/>

</svg>
`;

/* 📍 건물 데이터 */
const buildings = [
 {name:"Eiffel Tower", year:"1887", lat:48.8584, lng:2.2945},
 {name:"Taj Mahal", year:"1632", lat:27.1751, lng:78.0421},
 {name:"Sydney Opera House", year:"1959", lat:-33.8568, lng:151.2153},
 {name:"Burj Khalifa", year:"2010", lat:25.1972, lng:55.2744},
 {name:"DDP", year:"2009", lat:37.5668, lng:127.0092},
 {name:"Guggenheim Museum", year:"1943", lat:40.7830, lng:-73.9590},
 {name:"Colosseum", year:"80 AD", lat:41.8902, lng:12.4922},
 {name:"Big Ben", year:"1859", lat:51.5007, lng:-0.1246},
 {name:"Louvre Pyramid", year:"1985", lat:48.8606, lng:2.3376},
 {name:"Beijing Stadium", year:"2003", lat:39.9917, lng:116.3842}
];

/* 좌표 변환 */
function lngToX(lng){ return (lng+180)/360 * window.innerWidth; }
function latToY(lat){ return (90-lat)/180 * window.innerHeight; }

const map = document.getElementById("map");
const scanner = document.getElementById("scanner");
const counter = document.getElementById("count");

let found = 0;

/* 건물 생성 */
buildings.forEach(b=>{
    const el = document.createElement("div");
    el.className="building";

    b.x = lngToX(b.lng);
    b.y = latToY(b.lat);

    el.style.left = b.x+"px";
    el.style.top = b.y+"px";

    map.appendChild(el);
    b.el = el;
    b.found = false;
});

/* 스캔 */
document.addEventListener("mousemove", e=>{
    scanner.style.left = e.clientX+"px";
    scanner.style.top = e.clientY+"px";

    buildings.forEach(b=>{
        if(b.found) return;

        const dx = e.clientX - b.x;
        const dy = e.clientY - b.y;

        if(Math.sqrt(dx*dx+dy*dy) < 40){
            b.found = true;
            b.el.classList.add("show");

            found++;
            counter.innerText = `${found} / 10`;

            showPopup(b);
            zoom(b.x,b.y);
        }
    });
});

/* 💖 팝업 */
function showPopup(b){
    const div = document.createElement("div");
    div.className="popup";
    div.innerHTML = `🏛 ${b.name} <br> (${b.year})`;
    document.body.appendChild(div);

    setTimeout(()=>div.remove(),1500);
}

/* 🔍 줌 */
function zoom(x,y){
    const cx = window.innerWidth/2;
    const cy = window.innerHeight/2;

    map.style.transform =
        `translate(${cx-x}px, ${cy-y}px) scale(1.8)`;

    setTimeout(()=>{
        map.style.transform = "translate(0,0) scale(1)";
    },700);
}

</script>
</body>
</html>
