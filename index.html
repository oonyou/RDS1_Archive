<div style="
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0b10;
  position:relative;
  font-family:Arial, sans-serif;
">

  <!-- MODE SCREEN -->
  <div id="modeScreen" style="
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
  ">

   <div style="
  color:white;
  font-size:28px;
  font-weight:900;
  letter-spacing:0.1px;
  text-transform:uppercase;
">
  SELECT MODE
</div>

    <div style="display:flex; gap:20px;">

      <!-- GAME MODE -->
      <div onclick="
        document.getElementById('modal').style.display='flex';
      "
      style="
        width:170px;
        padding:16px;
        background:#ff8fcf;
        border-radius:20px;
        text-align:center;
        font-weight:900;
        color:white;
        cursor:pointer;

        box-shadow:
          0 0 8px rgba(255,143,207,0.5),
          0 0 18px rgba(255,143,207,0.3);

        transition:0.25s ease;
      "
      onmouseover="this.style.transform='scale(1.06)'; this.style.boxShadow='0 0 14px rgba(255,143,207,0.7), 0 0 28px rgba(255,143,207,0.4)';"
      onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 0 8px rgba(255,143,207,0.5), 0 0 18px rgba(255,143,207,0.3)';"
      >
        GAME MODE
      </div>

      <!-- VIEW MODE -->
      <a href="https://my-game-five-topaz.vercel.app/" style="text-decoration:none;">
        <div style="
          width:170px;
          padding:16px;
          background:#2a2a33;
          border-radius:20px;
          text-align:center;
          font-weight:900;
          color:#fff;
          cursor:pointer;

          box-shadow:
            0 0 6px rgba(255,255,255,0.06);

          transition:0.25s ease;
        "
        onmouseover="this.style.transform='scale(1.06)'"
        onmouseout="this.style.transform='scale(1)'"
        >
          VIEW MODE
        </div>
      </a>

    </div>
  </div>

    justify-content:center;
    flex-direction:column;

    <div style="

          0 0 8px rgba(255,143,207,0.5),
