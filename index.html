<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARCHITECTURE EXPLORER - LANDING</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #ffc6da 0%, #ffc0d0 100%);
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-weight: 500;
            height: 100vh;
            width: 100vw;
            position: relative;
            cursor: default;
        }

        .photo-gallery {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            overflow: hidden;
            pointer-events: auto;
        }

        .photo-card {
            position: absolute;
            width: 170px;
            height: 220px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.35);
            cursor: grab;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s ease;
            will-change: transform;
            background: rgba(255, 240, 245, 0.92);
            backdrop-filter: blur(2px);
            pointer-events: auto;
        }

        .photo-card:active {
            cursor: grabbing;
        }

        .photo-card:hover {
            transform: scale(1.03) rotate(0.5deg);
            box-shadow: 0 18px 36px rgba(199, 21, 133, 0.3), 0 0 0 2px rgba(255, 105, 180, 0.6);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .photo-card .front-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: opacity 0.28s ease-in-out;
        }

        /* 只对前21张卡片启用 hover 切换效果 */
        .photo-card.hover-enabled .hover-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.28s ease-in-out;
        }

        .photo-card.hover-enabled:hover .front-img {
            opacity: 0;
        }

        .photo-card.hover-enabled:hover .hover-img {
            opacity: 1;
        }

        .photo-card:not(.hover-enabled) .hover-img {
            display: none;
        }

        .start-button-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: auto;
            text-align: center;
            filter: drop-shadow(0 0 12px rgba(199, 21, 133, 0.25));
        }

        .start-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            border: 1.8px solid #ff99cc;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.8px;
            color: #b01070;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            white-space: nowrap;
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            color: #c71585;
            border-color: #ff66b2;
            transform: scale(1.04);
            box-shadow: 0 0 16px rgba(255, 20, 147, 0.3);
            letter-spacing: 2px;
        }

        /* 响应式：小屏幕略微缩小卡片尺寸 */
        @media (max-width: 700px) {
            .photo-card {
                width: 135px;
                height: 175px;
            }
            .start-btn {
                padding: 6px 20px;
                font-size: 0.75rem;
            }
        }
        
        @media (max-width: 550px) {
            .photo-card {
                width: 120px;
                height: 156px;
            }
        }
    </style>
</head>
<body>

<div class="photo-gallery" id="photoGallery"></div>
<div class="start-button-container">
    <button class="start-btn" id="startBtn">✦ START TO DISCOVER ✦</button>
</div>

<script>
    (function() {
        // ============================================================
        // 📷 完整60张卡片 + 超低浮动频率优化版
        // 保留 pattern_01 ~ pattern_60 全部正面图
        // 前21张保留 building_01 ~ building_21 的hover效果
        // 
        // 🎯 最新改进：卡片初始分布极度分散，避免拥挤
        // 使用多轮迭代排斥算法 + 网格锚定，确保60张卡片均匀布满整个屏幕
        // ============================================================
        
        const TOTAL_CARDS = 60;      // 完整60张卡片
        const HOVER_COUNT = 21;      // 前21张有建筑hover效果
        
        // 构建图片列表
        const IMAGES_LIST = [];
        for (let i = 1; i <= TOTAL_CARDS; i++) {
            const patternIndex = i.toString().padStart(2, '0');
            const frontPath = `images/pattern_${patternIndex}.jpg`;
            
            if (i <= HOVER_COUNT) {
                const buildingIndex = i.toString().padStart(2, '0');
                const hoverPath = `images/building_${buildingIndex}.jpg`;
                IMAGES_LIST.push({ front: frontPath, hover: hoverPath, hasHover: true });
            } else {
                IMAGES_LIST.push({ front: frontPath, hover: null, hasHover: false });
            }
        }
        
        // 🎯 超级分散算法：基于 Poisson Disc 采样思想的简化版本
        // 确保每个卡片之间保持足够距离，整体均匀分布
        
        function getSuperDispersedPositions(cardsConfig, margin = 20) {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            const positions = [];
            
            // 计算每张卡片的尺寸（可能有轻微差异）
            const cardSizes = cardsConfig.map((cfg, idx) => {
                let w = 170;
                let h = 220;
                if (idx % 7 === 0) w = 173;
                if (idx % 9 === 0) h = 223;
                return { width: w, height: h };
            });
            
            // 第一步：使用网格法确定大致区域（10x6网格，60个格子，每个格子内放一个）
            const gridCols = 10;
            const gridRows = 6;
            const cellWidth = (screenWidth - margin * 2) / gridCols;
            const cellHeight = (screenHeight - margin * 2) / gridRows;
            
            // 为每个卡片分配一个网格位置，并打乱顺序让分布更自然
            const gridIndices = [];
            for (let row = 0; row < gridRows; row++) {
                for (let col = 0; col < gridCols; col++) {
                    if (gridIndices.length < TOTAL_CARDS) {
                        gridIndices.push({ row, col });
                    }
                }
            }
            // Fisher-Yates 打乱，让卡片随机分配到网格中
            for (let i = gridIndices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [gridIndices[i], gridIndices[j]] = [gridIndices[j], gridIndices[i]];
            }
            
            // 第二步：基于网格生成初始位置，并在网格内随机偏移，同时避开中央按钮区域
            const centerX = screenWidth / 2;
            const centerY = screenHeight / 2;
            const minDistToCenter = 130; // 避开中心按钮
            
            for (let i = 0; i < TOTAL_CARDS; i++) {
                const gridPos = gridIndices[i];
                const cardW = cardSizes[i].width;
                const cardH = cardSizes[i].height;
                
                // 网格基础位置
                let baseX = margin + gridPos.col * cellWidth;
                let baseY = margin + gridPos.row * cellHeight;
                
                // 在网格内随机偏移（偏移范围使卡片不严格对齐，更自然）
                const offsetX = (Math.random() - 0.5) * cellWidth * 0.6;
                const offsetY = (Math.random() - 0.5) * cellHeight * 0.6;
                
                let x = baseX + offsetX;
                let y = baseY + offsetY;
                
                // 边界约束
                x = Math.min(Math.max(x, margin), screenWidth - cardW - margin);
                y = Math.min(Math.max(y, margin), screenHeight - cardH - margin);
                
                // 避开中心按钮区域
                const distToCenter = Math.hypot(x + cardW/2 - centerX, y + cardH/2 - centerY);
                if (distToCenter < minDistToCenter) {
                    // 向外推离中心
                    const angle = Math.atan2(y + cardH/2 - centerY, x + cardW/2 - centerX);
                    const pushDist = minDistToCenter - distToCenter + 15;
                    x += Math.cos(angle) * pushDist;
                    y += Math.sin(angle) * pushDist;
                    x = Math.min(Math.max(x, margin), screenWidth - cardW - margin);
                    y = Math.min(Math.max(y, margin), screenHeight - cardH - margin);
                }
                
                positions.push({ x, y, width: cardW, height: cardH });
            }
            
            // 第三步：迭代排斥算法 - 让卡片之间保持最小距离
            // 这个算法会多次迭代，将靠得太近的卡片互相推离
            const minDistance = 185; // 最小间距（卡片中心之间的距离）
            const iterations = 35;    // 迭代次数足够让分布均匀
            
            for (let iter = 0; iter < iterations; iter++) {
                let moved = false;
                
                for (let i = 0; i < positions.length; i++) {
                    const posA = positions[i];
                    const centerAx = posA.x + posA.width / 2;
                    const centerAy = posA.y + posA.height / 2;
                    
                    for (let j = i + 1; j < positions.length; j++) {
                        const posB = positions[j];
                        const centerBx = posB.x + posB.width / 2;
                        const centerBy = posB.y + posB.height / 2;
                        
                        const dx = centerAx - centerBx;
                        const dy = centerAy - centerBy;
                        const dist = Math.hypot(dx, dy);
                        
                        if (dist < minDistance && dist > 0.01) {
                            // 需要推开
                            const overlap = minDistance - dist;
                            const angle = Math.atan2(dy, dx);
                            const pushX = Math.cos(angle) * overlap * 0.5;
                            const pushY = Math.sin(angle) * overlap * 0.5;
                            
                            // 移动两个卡片
                            posA.x += pushX;
                            posA.y += pushY;
                            posB.x -= pushX;
                            posB.y -= pushY;
                            
                            // 边界约束
                            posA.x = Math.min(Math.max(posA.x, margin), screenWidth - posA.width - margin);
                            posA.y = Math.min(Math.max(posA.y, margin), screenHeight - posA.height - margin);
                            posB.x = Math.min(Math.max(posB.x, margin), screenWidth - posB.width - margin);
                            posB.y = Math.min(Math.max(posB.y, margin), screenHeight - posB.height - margin);
                            
                            moved = true;
                        }
                    }
                }
                
                // 如果没有移动，提前退出
                if (!moved) break;
            }
            
            // 第四步：最终边界检查 + 避开中心区域（二次确保）
            for (let i = 0; i < positions.length; i++) {
                const pos = positions[i];
                pos.x = Math.min(Math.max(pos.x, margin), screenWidth - pos.width - margin);
                pos.y = Math.min(Math.max(pos.y, margin), screenHeight - pos.height - margin);
                
                // 再次避开中心
                const distToCenter = Math.hypot(pos.x + pos.width/2 - centerX, pos.y + pos.height/2 - centerY);
                if (distToCenter < minDistToCenter) {
                    const angle = Math.atan2(pos.y + pos.height/2 - centerY, pos.x + pos.width/2 - centerX);
                    const pushDist = minDistToCenter - distToCenter + 10;
                    pos.x += Math.cos(angle) * pushDist;
                    pos.y += Math.sin(angle) * pushDist;
                    pos.x = Math.min(Math.max(pos.x, margin), screenWidth - pos.width - margin);
                    pos.y = Math.min(Math.max(pos.y, margin), screenHeight - pos.height - margin);
                }
            }
            
            return positions;
        }
        
        const gallery = document.getElementById('photoGallery');
        const cards = [];
        const fragment = document.createDocumentFragment();
        
        // 准备卡片配置（用于分散算法）
        const cardsConfig = [];
        for (let idx = 0; idx < TOTAL_CARDS; idx++) {
            let w = 170, h = 220;
            if (idx % 7 === 0) w = 173;
            if (idx % 9 === 0) h = 223;
            cardsConfig.push({ width: w, height: h });
        }
        
        // 获取超级分散的位置
        const dispersedPositions = getSuperDispersedPositions(cardsConfig, 18);
        
        // 创建所有卡片
        IMAGES_LIST.forEach((imgData, idx) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            if (imgData.hasHover) {
                card.classList.add('hover-enabled');
            }
            
            // 设置尺寸
            let widthVar = 170;
            let heightVar = 220;
            if (idx % 7 === 0) widthVar = 173;
            if (idx % 9 === 0) heightVar = 223;
            
            card.style.width = `${widthVar}px`;
            card.style.height = `${heightVar}px`;
            
            // 使用计算好的分散位置
            const pos = dispersedPositions[idx];
            const x = pos.x;
            const y = pos.y;
            const rotate = (Math.random() - 0.5) * 14;
            
            // 使用 translate3d 开启 GPU 加速
            card.style.left = '0px';
            card.style.top = '0px';
            card.style.transform = `translate3d(${x}px, ${y}px, 0) rotate(${rotate}deg)`;
            const baseZIndex = Math.floor(Math.random() * 30) + 5;
            card.style.zIndex = baseZIndex;
            
            // 正面图片
            const frontImg = document.createElement('img');
            frontImg.src = imgData.front;
            frontImg.alt = `Pattern ${idx + 1}`;
            frontImg.classList.add('front-img');
            frontImg.loading = 'lazy';
            card.appendChild(frontImg);
            
            // 仅当前21张才创建 hover 图片
            if (imgData.hasHover && imgData.hover) {
                const hoverImg = document.createElement('img');
                hoverImg.src = imgData.hover;
                hoverImg.alt = `Building ${idx + 1}`;
                hoverImg.classList.add('hover-img');
                hoverImg.loading = 'lazy';
                card.appendChild(hoverImg);
                hoverImg.onerror = () => console.warn(`图片加载失败: ${imgData.hover}`);
            }
            
            frontImg.onerror = () => console.warn(`图片加载失败: ${imgData.front}`);
            
            fragment.appendChild(card);
            
            cards.push({
                el: card,
                width: widthVar,
                height: heightVar,
                isDragging: false,
                dragStartX: 0,
                dragStartY: 0,
                currentX: x,
                currentY: y,
                currentRotate: rotate,
                originalZIndex: baseZIndex,
                // 超低浮动速度：极缓慢漂移
                vx: (Math.random() - 0.5) * 3.0,
                vy: (Math.random() - 0.5) * 3.0,
            });
        });
        
        gallery.appendChild(fragment);
        
        // 动画参数
        let lastFrameTime = 0;
        const TARGET_FPS = 24;
        const FRAME_INTERVAL = 1000 / TARGET_FPS;
        
        const DAMP_FACTOR = 0.998;
        const BOUND_DAMP = 0.96;
        const MIN_SPEED = 0.3;
        const MAX_SPEED = 5.0;
        
        function updateCardPosition(card) {
            card.el.style.transform = `translate3d(${card.currentX}px, ${card.currentY}px, 0) rotate(${card.currentRotate}deg)`;
        }
        
        function handleBoundaries(card) {
            let { currentX, currentY, vx, vy, width, height } = card;
            let bounced = false;
            
            const leftBound = -width + 12;
            const rightBound = window.innerWidth - 12;
            const topBound = -height + 12;
            const bottomBound = window.innerHeight - 12;
            
            if (currentX <= leftBound) {
                currentX = leftBound;
                vx = Math.abs(vx) * BOUND_DAMP;
                if (vx < MIN_SPEED) vx = MIN_SPEED;
                bounced = true;
            } else if (currentX >= rightBound) {
                currentX = rightBound;
                vx = -Math.abs(vx) * BOUND_DAMP;
                if (Math.abs(vx) < MIN_SPEED) vx = -MIN_SPEED;
                bounced = true;
            }
            
            if (currentY <= topBound) {
                currentY = topBound;
                vy = Math.abs(vy) * BOUND_DAMP;
                if (vy < MIN_SPEED) vy = MIN_SPEED;
                bounced = true;
            } else if (currentY >= bottomBound) {
                currentY = bottomBound;
                vy = -Math.abs(vy) * BOUND_DAMP;
                if (Math.abs(vy) < MIN_SPEED) vy = -MIN_SPEED;
                bounced = true;
            }
            
            card.currentX = currentX;
            card.currentY = currentY;
            card.vx = vx;
            card.vy = vy;
            
            return bounced;
        }
        
        let animationActive = true;
        let frameCount = 0;
        
        function animateFloating(timestamp) {
            if (!animationActive) return;
            
            if (timestamp - lastFrameTime < FRAME_INTERVAL) {
                requestAnimationFrame(animateFloating);
                return;
            }
            
            const delta = Math.min(0.05, (timestamp - lastFrameTime) / 1000);
            lastFrameTime = timestamp;
            
            for (let i = 0; i < cards.length; i++) {
                const card = cards[i];
                if (card.isDragging) continue;
                
                let newX = card.currentX + card.vx * delta;
                let newY = card.currentY + card.vy * delta;
                
                card.currentX = newX;
                card.currentY = newY;
                
                const bounced = handleBoundaries(card);
                
                if (frameCount % 60 === 0 && !bounced) {
                    if (Math.random() < 0.3) {
                        card.vx += (Math.random() - 0.5) * 0.8;
                        card.vy += (Math.random() - 0.5) * 0.8;
                        card.vx = Math.min(Math.max(card.vx, -MAX_SPEED), MAX_SPEED);
                        card.vy = Math.min(Math.max(card.vy, -MAX_SPEED), MAX_SPEED);
                    }
                }
                
                if (frameCount % 2 === 0) {
                    card.vx *= DAMP_FACTOR;
                    card.vy *= DAMP_FACTOR;
                }
                
                updateCardPosition(card);
            }
            
            frameCount++;
            requestAnimationFrame(animateFloating);
        }
        
        // 拖拽系统（拖拽时提升 zIndex）
        let currentHighestZ = 1000;
        function getNextHighestZ() {
            currentHighestZ++;
            return currentHighestZ;
        }
        
        function attachDragEvents(cardObj) {
            const el = cardObj.el;
            
            const onPointerDown = (e) => {
                if (e.target.closest('.start-btn')) return;
                e.preventDefault();
                e.stopPropagation();
                
                cardObj.isDragging = true;
                const newZ = getNextHighestZ();
                el.style.zIndex = newZ;
                el.style.cursor = 'grabbing';
                el.style.transition = 'none';
                
                let clientX = e.clientX;
                let clientY = e.clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
                
                cardObj.dragStartX = clientX - cardObj.currentX;
                cardObj.dragStartY = clientY - cardObj.currentY;
                cardObj.vx *= 0.3;
                cardObj.vy *= 0.3;
            };
            
            const onPointerMove = (e) => {
                if (!cardObj.isDragging) return;
                e.preventDefault();
                
                let clientX = e.clientX;
                let clientY = e.clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
                
                let newX = clientX - cardObj.dragStartX;
                let newY = clientY - cardObj.dragStartY;
                
                const leftBound = -cardObj.width + 12;
                const rightBound = window.innerWidth - 12;
                const topBound = -cardObj.height + 12;
                const bottomBound = window.innerHeight - 12;
                
                newX = Math.min(Math.max(newX, leftBound), rightBound);
                newY = Math.min(Math.max(newY, topBound), bottomBound);
                
                cardObj.currentX = newX;
                cardObj.currentY = newY;
                updateCardPosition(cardObj);
                cardObj.vx *= 0.95;
                cardObj.vy *= 0.95;
            };
            
            const onPointerUp = () => {
                if (cardObj.isDragging) {
                    cardObj.isDragging = false;
                    el.style.cursor = 'grab';
                    el.style.transition = '';
                    
                    if (Math.abs(cardObj.vx) < 0.5 && Math.abs(cardObj.vy) < 0.5) {
                        cardObj.vx += (Math.random() - 0.5) * 1.2;
                        cardObj.vy += (Math.random() - 0.5) * 1.2;
                        cardObj.vx = Math.min(Math.max(cardObj.vx, -MAX_SPEED), MAX_SPEED);
                        cardObj.vy = Math.min(Math.max(cardObj.vy, -MAX_SPEED), MAX_SPEED);
                    }
                }
            };
            
            el.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);
        }
        
        cards.forEach(card => attachDragEvents(card));
        
        lastFrameTime = performance.now();
        animationActive = true;
        requestAnimationFrame(animateFloating);
        
        let resizeTimeout;
        window.addEventListener('resize', () => {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                for (let i = 0; i < cards.length; i++) {
                    const card = cards[i];
                    const leftBound = -card.width + 12;
                    const rightBound = window.innerWidth - 12;
                    const topBound = -card.height + 12;
                    const bottomBound = window.innerHeight - 12;
                    
                    let changed = false;
                    if (card.currentX < leftBound) {
                        card.currentX = leftBound;
                        changed = true;
                    } else if (card.currentX > rightBound) {
                        card.currentX = rightBound;
                        changed = true;
                    }
                    
                    if (card.currentY < topBound) {
                        card.currentY = topBound;
                        changed = true;
                    } else if (card.currentY > bottomBound) {
                        card.currentY = bottomBound;
                        changed = true;
                    }
                    
                    if (changed) {
                        updateCardPosition(card);
                        if (card.currentX === leftBound || card.currentX === rightBound) {
                            card.vx = -card.vx * 0.5;
                        }
                        if (card.currentY === topBound || card.currentY === bottomBound) {
                            card.vy = -card.vy * 0.5;
                        }
                    }
                }
            }, 150);
        });
        
        const startBtn = document.getElementById('startBtn');
        if (startBtn) {
            startBtn.addEventListener('click', () => {
                window.location.href = 'map.html';
            });
        }
        
        cards.forEach(card => {
            card.el.style.cursor = 'grab';
        });
        
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                animationActive = false;
            } else {
                animationActive = true;
                lastFrameTime = performance.now();
                requestAnimationFrame(animateFloating);
            }
        });
        
        console.log(`✨ 超级分散版已启动 | 卡片数量: ${cards.length}张 | 已使用网格+排斥算法确保均匀分布 | 拖拽自动前置`);
    })();
</script>
</body>
</html>
